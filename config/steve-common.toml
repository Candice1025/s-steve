[ai]
    provider = "ollama"

[openai]
    # Your OpenAI API key (required for Groq fallback)
    apiKey = "48633a373d76431ca6da84ea84e9f367.NJ612EYmFPFTm1_Z_ImwvFOS"
    
    # OpenAI model to use (gpt-4, gpt-4-turbo-preview, gpt-3.5-turbo)
    model = "gpt-4-turbo-preview"

[ollama]
    # 云端 API 地址
    apiUrl = "https://api.ollama.com/api/chat"
    
    # 您的 API key
    apiKey = "48633a373d76431ca6da84ea84e9f367.NJ612EYmFPFTm1_Z_ImwvFOS"
    
    # 模型名称
    model = "llama3"

[behavior]
    # Ticks between action checks (20 ticks = 1 second)
    actionTickDelay = 20
    
    # Allow Steves to respond in chat
    enableChatResponses = true
    
    # Maximum number of Steves that can be active simultaneously
    maxActiveSteves = 10

